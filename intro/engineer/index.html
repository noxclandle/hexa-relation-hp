<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>エンジニア・クリエイター向けポートフォリオ制作 | Hexa Relation</title>
    <meta name="description" content="エンジニアの技術力を「UIそのもの」で証明する。レトロゲーム風、コードライクなデザインなど、ギミック満載の面白いポートフォリオを構築します。">
    <meta name="keywords" content="エンジニア ポートフォリオ, クリエイター サイト 制作, 面白い ポートフォリオ, ギミック Web制作">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Noto+Sans+JP:wght@300;400;700&family=Share+Tech+Mono&family=DotGothic16&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #000; --accent: #0f0; }
        body { background-color: var(--bg); color: #fff; font-family: 'Noto Sans JP', sans-serif; }
        .cinzel { font-family: 'Cinzel', serif; }
        .glass { background: rgba(0, 255, 0, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(0, 255, 0, 0.2); }
        .reveal { opacity: 0; transform: translateY(20px); transition: 1s all ease; }
        .reveal.active { opacity: 1; transform: translateY(0); }
    </style>
</head>
<body class="overflow-x-hidden">
    <section class="h-screen flex flex-col justify-center items-center text-center p-6">
        <h1 class="cinzel text-5xl md:text-8xl mb-6 font-bold" style="color: var(--accent);">FOR_CREATORS</h1>
        <p class="text-xl md:text-3xl font-light opacity-80 leading-relaxed">
            「コードの美しさ」を、<br>「体験の凄み」で語れ。
        </p>
    </section>

    <main class="max-w-4xl mx-auto px-6 pb-40">
        <div class="glass p-12 reveal mb-10">
            <h2 class="text-2xl font-bold mb-6">技術力を、指先で感じさせる。</h2>
            <p class="text-green-900 opacity-80 leading-loose" style="color: var(--accent);">
                エンジニアにとって、ポートフォリオはそれ自体が「プロダクト」であるべきです。レトロゲームの隠しコマンド、動的なシステムログ、物理演算を使ったUI。Hexa Relationは、あなたのスキルレベルを直感的に証明する「驚き」を実装。他と圧倒的な差をつける技術のショーケースを制作します。
            </p>
        </div>
        <div class="text-center mt-20">
            <a href="../../order/index.html?from=intro_engineer" class="inline-block border-2 border-green-500 px-16 py-6 font-bold hover:bg-green-500 hover:text-black transition-all" style="color: var(--accent);">
                技術の結晶を 鍛造する
            </a>
        </div>
    </main>

    <script>
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => { if (entry.isIntersecting) entry.target.classList.add('active'); });
        }, { threshold: 0.1 });
        document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
    </script>
</body>
</html>

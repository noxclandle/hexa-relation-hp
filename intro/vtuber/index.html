<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VTuber・配信者向けゲーム風ポートフォリオ制作 | Hexa Relation</title>
    <meta name="description" content="VTuber・配信者のための没入型自己紹介サイト。アバターの世界観をWebに。ビジュアルノベル風、RPG風など、ファンが喜ぶギミック満載のサイトを制作します。">
    <meta name="keywords" content="VTuber 自己紹介 サイト, 配信者 ポートフォリオ, Vチューバー LP 依頼, ゲーム風 プロフィール">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Noto+Sans+JP:wght@300;400;700&family=DotGothic16&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #050505; --accent: #ff007f; }
        body { background-color: var(--bg); color: #fff; font-family: 'Noto Sans JP', sans-serif; }
        .cinzel { font-family: 'Cinzel', serif; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .reveal { opacity: 0; transform: translateY(20px); transition: 1s all ease; }
        .reveal.active { opacity: 1; transform: translateY(0); }
    </style>
</head>
<body class="overflow-x-hidden">
    <!-- Simple high-end intro structure for VTuber niche -->
    <section class="h-screen flex flex-col justify-center items-center text-center p-6">
        <h1 class="cinzel text-5xl md:text-8xl mb-6 font-bold" style="color: var(--accent);">FOR_VTUBERS</h1>
        <p class="text-xl md:text-3xl font-light opacity-80 leading-relaxed">
            「ただの画像」から、<br>「操作できる世界」へ。
        </p>
    </section>

    <main class="max-w-4xl mx-auto px-6 pb-40">
        <div class="glass p-12 reveal mb-10">
            <h2 class="text-2xl font-bold mb-6">ファンが喜ぶ「体験」を贈る。</h2>
            <p class="text-gray-400 leading-loose">
                視聴者はあなたのアバターだけでなく、その背後にある物語（世界観）を愛しています。Hexa Relationは、その物語をビジュアルノベル形式のメッセージウィンドウや、RPG風のステータス画面として具現化。あなたのWebサイトそのものを、ファンのための「聖地」に変えます。
            </p>
        </div>
        <div class="text-center mt-20">
            <a href="../../order/index.html?from=intro_vtuber" class="inline-block border-2 border-white px-16 py-6 font-bold hover:bg-white hover:text-black transition-all">
                アバターの世界を 構築する
            </a>
        </div>
    </main>

    <script>
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => { if (entry.isIntersecting) entry.target.classList.add('active'); });
        }, { threshold: 0.1 });
        document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
    </script>
</body>
</html>

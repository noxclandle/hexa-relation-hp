<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hexa Relation | 管理コンソール</title>
    <link href="https://fonts.googleapis.com/css2?family=DotGothic16&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --primary-color: #00ff00;
            --accent-color: #ffffff;
            --bg-color: #000000;
        }

        body {
            background-color: var(--bg-color);
            color: var(--primary-color);
            font-family: 'DotGothic16', sans-serif;
            padding: 20px;
        }

        .debug-window {
            border: 2px solid var(--primary-color);
            padding: 20px;
            border-radius: 8px;
            max-width: 800px;
            margin: 0 auto;
            background: rgba(0, 20, 0, 0.9);
        }

        h1 { font-size: 1.5rem; margin-bottom: 20px; border-bottom: 2px solid var(--primary-color); display: inline-block; }

        .stat-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            border: 1px solid var(--primary-color);
            padding: 15px;
            background: rgba(0, 40, 0, 0.5);
        }

        .stat-value { font-size: 2rem; font-weight: bold; margin-top: 10px; }
        .stat-label { font-size: 0.8rem; opacity: 0.7; }

        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid var(--primary-color); padding: 10px; text-align: left; }
        th { background: rgba(0, 100, 0, 0.3); }

        .blink { animation: blink 1s step-end infinite; }
        @keyframes blink { 50% { opacity: 0; } }
        
        .mock-tag { font-size: 0.7rem; background: var(--primary-color); color: #000; padding: 2px 5px; margin-left: 10px; }
        .hidden { display: none !important; }

        /* Log Modal Style */
        #log-modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); z-index: 2000; align-items: center; justify-content: center;
        }
        .log-window {
            border: 2px solid var(--primary-color);
            background: #000;
            padding: 20px;
            width: 95%;
            max-width: 500px;
            max-height: 80vh;
            overflow-y: auto;
            border-radius: 8px;
            box-shadow: 0 0 20px rgba(0,255,0,0.2);
        }
        .log-item {
            border-bottom: 1px dashed #004400;
            padding: 10px 0;
            font-size: 0.9rem;
            display: flex;
            justify-content: space-between;
        }
        .log-date { color: #888; font-size: 0.8rem; }
        .log-ref { color: var(--primary-color); font-weight: bold; }
    </style>
</head>
<body>

    <div id="password-gate" class="flex flex-col items-center justify-center min-h-[80vh]">
        <div class="debug-window w-full max-w-sm text-center">
            <h1 class="mb-6">▼ 認証が必要</h1>
            <p class="mb-4">パスワードを いれてください</p>
            <input type="password" id="admin-pass" class="w-full bg-black border-2 border-green-500 p-2 text-green-500 mb-6 outline-none text-center">
            <button onclick="checkPass()" class="border-2 border-green-500 p-2 w-full hover:bg-green-500 hover:text-black transition-all">▶ ログイン</button>
        </div>
    </div>

    <div id="admin-content" class="hidden">
        <div class="debug-window">
            <h1>▼ Hexa Relation / アクセス・デバッグコンソール <span class="blink">_</span></h1>
            
            <div class="stat-grid">
                <div class="stat-card">
                    <div class="stat-label">トータルアクセス</div>
                    <div id="total-hits" class="stat-value">0</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">累計ごいらい</div>
                    <div id="total-orders" class="stat-value">0</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">生存日数</div>
                    <div id="days-active" class="stat-value">---</div>
                </div>
            </div>

            <h2>▶ 各ページ解析データ</h2>
            <table id="analytics-table">
                <thead>
                    <tr>
                        <th>ページ名</th>
                        <th>ヒット数</th>
                        <th>最新の訪問（クリックで詳細）</th>
                    </tr>
                </thead>
                <tbody>
                    <!-- Real-time data will be injected here -->
                </tbody>
            </table>

            <div class="mt-8 p-4 border border-dashed border-green-800 text-sm">
                <p>※ Firebase Real-time 連携中...</p>
            </div>
        </div>
    </div>

    <!-- ログ詳細チビ窓 -->
    <div id="log-modal" onclick="closeLogModal()">
        <div class="log-window" onclick="event.stopPropagation()">
            <div class="flex justify-between items-center mb-4 border-b border-green-500 pb-2">
                <h3 id="log-title">▶ 訪問履歴</h3>
                <button onclick="closeLogModal()" class="text-xs border border-green-500 px-2 hover:bg-green-500 hover:text-black">とじる</button>
            </div>
            <div id="log-content">
                <!-- ログがここに流し込まれる -->
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script>
        const firebaseConfig = {
          apiKey: "AIzaSyDlovNerE44bGykzWDJkqmoD4fbSHnzveI",
          authDomain: "hexa-relation.firebaseapp.com",
          projectId: "hexa-relation",
          storageBucket: "hexa-relation.firebasestorage.app",
          messagingSenderId: "318065017750",
          appId: "1:318065017750:web:94acf3c9c43632b3ff93b7",
          measurementId: "G-15NM9TWFE2"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // 自動表示リスト
        const portfolioList = ['nox'];

        function startAnalytics() {
            db.collection('analytics').onSnapshot((querySnapshot) => {
                const tbody = document.querySelector('#analytics-table tbody');
                tbody.innerHTML = '';
                let totalHits = 0;

                const statsMap = {};
                querySnapshot.forEach((doc) => {
                    statsMap[doc.id] = doc.data();
                });

                portfolioList.forEach(id => {
                    const data = statsMap[id] || { hits: 0, lastVisit: null };
                    totalHits += data.hits || 0;

                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td>${id}</td>
                        <td>${data.hits || 0}</td>
                        <td class="cursor-pointer hover:underline text-green-400" onclick="showLogs('${id}')">
                            ${data.lastVisit ? data.lastVisit.toDate().toLocaleString() : '---'}
                        </td>
                    `;
                    tbody.appendChild(tr);
                });

                document.getElementById('total-hits').innerText = totalHits.toLocaleString();
            });

            db.collection('orders').onSnapshot(snap => {
                document.getElementById('total-orders').innerText = snap.size;
            });
        }

        async function showLogs(pageId) {
            const modal = document.getElementById('log-modal');
            const content = document.getElementById('log-content');
            document.getElementById('log-title').innerText = `▶ ${pageId} の訪問履歴`;
            
            content.innerHTML = '<p class="blink">LOADING...</p>';
            modal.style.display = 'flex';

            try {
                // 最新20件のログを取得
                const snapshot = await db.collection('referrals').doc(pageId).collection('logs')
                    .orderBy('timestamp', 'desc').limit(20).get();
                
                if (snapshot.empty) {
                    content.innerHTML = '<p class="opacity-50 italic">ログが ありません</p>';
                    return;
                }

                content.innerHTML = '';
                snapshot.forEach(doc => {
                    const log = doc.data();
                    const date = log.timestamp ? log.timestamp.toDate().toLocaleString() : '---';
                    const div = document.createElement('div');
                    div.className = 'log-item';
                    div.innerHTML = `<span class="log-date">${date}</span> <span class="log-ref">${log.referrer}</span>`;
                    content.appendChild(div);
                });
            } catch (err) {
                content.innerHTML = '<p class="text-red-500">エラーが おきました</p>';
                console.error(err);
            }
        }

        function closeLogModal() {
            document.getElementById('log-modal').style.display = 'none';
        }

        const startDate = new Date('2026-05-10');
        const today = new Date();
        const diffDays = Math.floor((today - startDate) / (1000 * 60 * 60 * 24));
        document.getElementById('days-active').innerText = diffDays;

        function checkPass() {
            const pass = document.getElementById('admin-pass').value;
            if (pass === '2213') {
                localStorage.setItem('admin_auth', 'true');
                showAdminContent();
            } else {
                alert('パスワードが ちがいます');
            }
        }

        function showAdminContent() {
            document.getElementById('password-gate').classList.add('hidden');
            document.getElementById('admin-content').classList.remove('hidden');
            startAnalytics();
        }

        if (localStorage.getItem('admin_auth') === 'true') {
            showAdminContent();
        }

        document.getElementById('admin-pass').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') checkPass();
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hexa Relation | 管理コンソール</title>
    <link href="https://fonts.googleapis.com/css2?family=DotGothic16&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --primary-color: #00ff00; /* Admin is Green style */
            --accent-color: #ffffff;
            --bg-color: #000000;
        }

        body {
            background-color: var(--bg-color);
            color: var(--primary-color);
            font-family: 'DotGothic16', sans-serif;
            padding: 20px;
        }

        .debug-window {
            border: 2px solid var(--primary-color);
            padding: 20px;
            border-radius: 8px;
            max-width: 800px;
            margin: 0 auto;
            background: rgba(0, 20, 0, 0.9);
        }

        h1 { font-size: 1.5rem; margin-bottom: 20px; border-bottom: 2px solid var(--primary-color); display: inline-block; }

        .stat-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            border: 1px solid var(--primary-color);
            padding: 15px;
            background: rgba(0, 40, 0, 0.5);
        }

        .stat-value { font-size: 2rem; font-weight: bold; margin-top: 10px; }
        .stat-label { font-size: 0.8rem; opacity: 0.7; }

        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid var(--primary-color); padding: 10px; text-align: left; }
        th { background: rgba(0, 100, 0, 0.3); }

        .blink { animation: blink 1s step-end infinite; }
        @keyframes blink { 50% { opacity: 0; } }
        
        .mock-tag { font-size: 0.7rem; background: var(--primary-color); color: #000; padding: 2px 5px; margin-left: 10px; }
    </style>
</head>
<body>

    <div class="debug-window">
        <h1>▼ Hexa Relation / アクセス・デバッグコンソール <span class="blink">_</span></h1>
        
        <div class="stat-grid">
            <div class="stat-card">
                <div class="stat-label">トータルアクセス</div>
                <div class="stat-value">2,540 <span class="mock-tag">MOCK</span></div>
            </div>
            <div class="stat-card">
                <div class="stat-label">本日受任したごいらい</div>
                <div class="stat-value">3 <span class="mock-tag">MOCK</span></div>
            </div>
            <div class="stat-card">
                <div class="stat-label">生存日数</div>
                <div class="stat-value">12 <span class="mock-tag">DAYS</span></div>
            </div>
        </div>

        <h2>▶ 各ページ解析データ</h2>
        <table>
            <thead>
                <tr>
                    <th>ページ名</th>
                    <th>ヒット数</th>
                    <th>主要な紹介元</th>
                    <th>成約(依頼)数</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>/save/nox/</td>
                    <td>1,245</td>
                    <td>X (Twitter)</td>
                    <td>8</td>
                </tr>
                <tr>
                    <td>/save/meimei/</td>
                    <td>890</td>
                    <td>YouTube</td>
                    <td>4</td>
                </tr>
                <tr>
                    <td>/ (Gateway)</td>
                    <td>405</td>
                    <td>Direct</td>
                    <td>-</td>
                </tr>
            </tbody>
        </table>

        <div class="mt-8 p-4 border border-dashed border-green-800 text-sm">
            <p>※ 現在このページはダミーデータを表示しています。</p>
            <p>Firebaseを接続することで、リアルタイムな数値がここに表示されます。</p>
        </div>
    </div>

</body>
</html>

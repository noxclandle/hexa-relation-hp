<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hexa Relation | 管理コンソール</title>
    <link href="https://fonts.googleapis.com/css2?family=DotGothic16&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --primary-color: #00ff00; /* Admin is Green style */
            --accent-color: #ffffff;
            --bg-color: #000000;
        }

        body {
            background-color: var(--bg-color);
            color: var(--primary-color);
            font-family: 'DotGothic16', sans-serif;
            padding: 20px;
        }

        .debug-window {
            border: 2px solid var(--primary-color);
            padding: 20px;
            border-radius: 8px;
            max-width: 800px;
            margin: 0 auto;
            background: rgba(0, 20, 0, 0.9);
        }

        h1 { font-size: 1.5rem; margin-bottom: 20px; border-bottom: 2px solid var(--primary-color); display: inline-block; }

        .stat-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            border: 1px solid var(--primary-color);
            padding: 15px;
            background: rgba(0, 40, 0, 0.5);
        }

        .stat-value { font-size: 2rem; font-weight: bold; margin-top: 10px; }
        .stat-label { font-size: 0.8rem; opacity: 0.7; }

        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid var(--primary-color); padding: 10px; text-align: left; }
        th { background: rgba(0, 100, 0, 0.3); }

        .blink { animation: blink 1s step-end infinite; }
        @keyframes blink { 50% { opacity: 0; } }
        
        .mock-tag { font-size: 0.7rem; background: var(--primary-color); color: #000; padding: 2px 5px; margin-left: 10px; }
    </style>
</head>
<body>

    <div class="debug-window">
        <h1>▼ Hexa Relation / アクセス・デバッグコンソール <span class="blink">_</span></h1>
        
        <div class="stat-grid">
            <div class="stat-card">
                <div class="stat-label">トータルアクセス</div>
                <div id="total-hits" class="stat-value">---</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">本日受任したごいらい</div>
                <div id="total-orders" class="stat-value">---</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">生存日数</div>
                <div id="days-active" class="stat-value">---</div>
            </div>
        </div>

        <h2>▶ 各ページ解析データ</h2>
        <table id="analytics-table">
            <thead>
                <tr>
                    <th>ページ名</th>
                    <th>ヒット数</th>
                    <th>最新の訪問</th>
                </tr>
            </thead>
            <tbody>
                <!-- Real-time data will be injected here -->
            </tbody>
        </table>

        <div class="mt-8 p-4 border border-dashed border-green-800 text-sm">
            <p>※ Firebase Real-time 連携中...</p>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script>
        const firebaseConfig = {
          apiKey: "AIzaSyDlovNerE44bGykzWDJkqmoD4fbSHnzveI",
          authDomain: "hexa-relation.firebaseapp.com",
          projectId: "hexa-relation",
          storageBucket: "hexa-relation.firebasestorage.app",
          messagingSenderId: "318065017750",
          appId: "1:318065017750:web:94acf3c9c43632b3ff93b7",
          measurementId: "G-15NM9TWFE2"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // データのリアルタイム監視
        db.collection('analytics').onSnapshot((querySnapshot) => {
            const tbody = document.querySelector('#analytics-table tbody');
            tbody.innerHTML = '';
            let totalHits = 0;

            querySnapshot.forEach((doc) => {
                const data = doc.data();
                totalHits += data.hits || 0;

                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>/save/${doc.id}/</td>
                    <td>${data.hits || 0}</td>
                    <td>${data.lastVisit ? data.lastVisit.toDate().toLocaleString() : '---'}</td>
                `;
                tbody.appendChild(tr);
            });

            document.getElementById('total-hits').innerText = totalHits.toLocaleString();
        });

        // 生存日数の計算
        const startDate = new Date('2026-05-10'); // プロジェクト開始日
        const today = new Date();
        const diffDays = Math.floor((today - startDate) / (1000 * 60 * 60 * 24));
        document.getElementById('days-active').innerText = diffDays;

        // 依頼数の取得 (orderコレクションがあれば)
        db.collection('orders').get().then(snap => {
            document.getElementById('total-orders').innerText = snap.size;
        });
    </script>

</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hexa Relation | 管理コンソール</title>
    <link href="https://fonts.googleapis.com/css2?family=DotGothic16&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --primary-color: #00ff00;
            --accent-color: #ffffff;
            --bg-color: #000000;
        }

        body {
            background-color: var(--bg-color);
            color: var(--primary-color);
            font-family: 'DotGothic16', sans-serif;
            padding: 20px;
        }

        .debug-window {
            border: 2px solid var(--primary-color);
            padding: 20px;
            border-radius: 8px;
            max-width: 800px;
            margin: 0 auto;
            background: rgba(0, 20, 0, 0.9);
        }

        h1 { font-size: 1.5rem; margin-bottom: 20px; border-bottom: 2px solid var(--primary-color); display: inline-block; }

        .stat-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            border: 1px solid var(--primary-color);
            padding: 15px;
            background: rgba(0, 40, 0, 0.5);
        }

        .stat-value { font-size: 2rem; font-weight: bold; margin-top: 10px; }
        .stat-label { font-size: 0.8rem; opacity: 0.7; }

        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid var(--primary-color); padding: 10px; text-align: left; }
        th { background: rgba(0, 100, 0, 0.3); }

        .blink { animation: blink 1s step-end infinite; }
        @keyframes blink { 50% { opacity: 0; } }
        
        .mock-tag { font-size: 0.7rem; background: var(--primary-color); color: #000; padding: 2px 5px; margin-left: 10px; }
        .hidden { display: none !important; }

        /* Log Modal Style */
        #log-modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); z-index: 2000; align-items: center; justify-content: center;
        }
        .log-window {
            border: 2px solid var(--primary-color);
            background: #000;
            padding: 20px;
            width: 95%;
            max-width: 500px;
            max-height: 80vh;
            overflow-y: auto;
            border-radius: 8px;
            box-shadow: 0 0 20px rgba(0,255,0,0.2);
        }
        .log-item {
            border-bottom: 1px dashed #004400;
            padding: 10px 0;
            font-size: 0.9rem;
            display: flex;
            justify-content: space-between;
        }
        .log-date { color: #888; font-size: 0.8rem; }
        .log-ref { color: var(--primary-color); font-weight: bold; }

        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #000; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #004400; border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #008800; }
    </style>
</head>
<body>

    <div id="password-gate" class="flex flex-col items-center justify-center min-h-[80vh]">
        <div class="debug-window w-full max-w-sm text-center">
            <h1 class="mb-6">▼ 認証が必要</h1>
            <p class="mb-4">パスワードを いれてください</p>
            <input type="password" id="admin-pass" class="w-full bg-black border-2 border-green-500 p-2 text-green-500 mb-6 outline-none text-center">
            <button onclick="checkPass()" class="border-2 border-green-500 p-2 w-full hover:bg-green-500 hover:text-black transition-all">▶ ログイン</button>
        </div>
    </div>

    <div id="admin-content" class="hidden">
        <div class="debug-window">
            <h1>▼ Hexa Relation / アクセス・デバッグコンソール <span class="blink">_</span></h1>
            
            <div class="stat-grid">
                <div class="stat-card">
                    <div class="stat-label">トータルアクセス</div>
                    <div id="total-hits" class="stat-value">0</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">累計ごいらい</div>
                    <div id="total-orders" class="stat-value">0</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">生存日数</div>
                    <div id="days-active" class="stat-value">---</div>
                </div>
            </div>

            <div class="mb-8 p-4 border border-green-500 bg-green-950/20">
                <div class="flex items-center gap-4">
                    <span class="text-xs">絞り込みサーチ:</span>
                    <input type="text" id="lp-search" oninput="filterLPs()" placeholder="キーワードを入力..." class="flex-1 bg-black border border-green-800 p-2 text-green-500 outline-none focus:border-green-400 text-sm">
                </div>
            </div>

            <div class="flex gap-4 mb-4 items-center">
                <h2 class="mr-auto">▶ 各ページ解析データ <span class="text-xs opacity-50 ml-2">(/save/ 配下)</span></h2>
                <span class="text-xs opacity-60">並び替え:</span>
                <button onclick="sortData('orders')" class="text-xs border border-green-800 px-2 py-1 hover:bg-green-900">依頼数</button>
                <button onclick="sortData('hits')" class="text-xs border border-green-800 px-2 py-1 hover:bg-green-900">ヒット数</button>
                <button onclick="sortData('visit')" class="text-xs border border-green-800 px-2 py-1 hover:bg-green-900">最新訪問</button>
            </div>
            <div class="max-h-[300px] overflow-y-auto border border-green-800 mb-8 custom-scrollbar">
                <table id="analytics-table" class="text-xs">
                    <thead class="sticky top-0 bg-green-900 z-10">
                        <tr>
                            <th>ページ名</th>
                            <th>依頼数</th>
                            <th>ヒット数</th>
                            <th>最新の訪問（詳細）</th>
                        </tr>
                    </thead>
                    <tbody>
                        <!-- Real-time data will be injected here -->
                    </tbody>
                </table>
            </div>

            <!-- Marketing LP Management Section (Dynamic) -->
            <div class="mt-12 pt-8 border-t border-green-900">
                <h2 class="mb-4">▶ 集客用LP・マーケティング導線 <span class="text-xs opacity-50 ml-2">(/intro/ 配下)</span></h2>
                <div class="max-h-[300px] overflow-y-auto border border-green-800 p-2 bg-black/40 custom-scrollbar">
                    <table id="marketing-table" class="text-xs w-full">
                        <thead class="sticky top-0 bg-green-900 z-10">
                            <tr>
                                <th class="p-2">Name</th>
                                <th class="p-2">Target / Description</th>
                                <th class="p-2">Action</th>
                            </tr>
                        </thead>
                        <tbody>
                            <!-- Data injected from MARKETING_PAGES -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <!-- ログ詳細チビ窓 -->
    <div id="log-modal" onclick="closeLogModal()">
        <div class="log-window" onclick="event.stopPropagation()">
            <div class="flex justify-between items-center mb-4 border-b border-green-500 pb-2">
                <h3 id="log-title">▶ 訪問履歴</h3>
                <button onclick="closeLogModal()" class="text-xs border border-green-500 px-2 hover:bg-green-500 hover:text-black">とじる</button>
            </div>
            <div id="log-content">
                <!-- ログがここに流し込まれる -->
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script>
        const firebaseConfig = {
          apiKey: "AIzaSyDlovNerE44bGykzWDJkqmoD4fbSHnzveI",
          authDomain: "hexa-relation.firebaseapp.com",
          projectId: "hexa-relation",
          storageBucket: "hexa-relation.firebasestorage.app",
          messagingSenderId: "318065017750",
          appId: "1:318065017750:web:94acf3c9c43632b3ff93b7",
          measurementId: "G-15NM9TWFE2"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // AUTO_INJECT_START
        const ALL_PAGE_IDS = ['nox', 'choco', 'ten', 'sabanomiso', '7ch'];
        const MARKETING_PAGES = [{"id":"archive","name":"Hexa Archive: 過去の「実績」を、永久保存する。","desc":"消えゆく実績を、美しい「アーカイブ」へ。Hexa Archiveは、あなたの過去作をミュージアムのように展示し、ブランドの価値を証明し続けます。"},{"id":"business","name":"経営者・起業家向けブランディングLP制作","desc":"経営者のための「戦う名刺」。一級建築士や専門職、起業家の実績をゲームのステータスとして可視化。信頼性と遊び心を両立した、惹きつけるブランディングサイト。従来の退屈な企業紹介を、圧倒的な実績（ステータス）へと変換します。"},{"id":"card","name":"Hexa Card: 次世代の「装備品」デジタル名刺","desc":"紙の名刺は、もう古い。Hexa Cardは、あなたのステータスを相手のスマホに直接転送する、次世代の「デジタル装備品」。RPG風のUIで、初対面の相手に強烈な印象を刻み込みます。"},{"id":"design-philosophy","name":"Hexa Relation: The Grand Design // 万物の「設計図」を再定義する","desc":"[DEEP_LEVEL_ACCESS] Hexa Relationとは何か。知性、美学、そして既存社会への反逆。MENSA会員である創設者が贈る、一万文字の思考ログ。これはWeb制作の枠を超えた、新しい生存の設計図である。"},{"id":"engineer","name":"エンジニア・クリエイター向けポートフォリオ制作","desc":"エンジニアの技術力を「UIそのもの」で証明する。レトロゲーム風、コードライクなデザインなど、ギミック満載の面白いポートフォリオを構築。テンプレートでは表現できない、あなたのスキルスタックを体験型のWebサイトへと昇華させます。"},{"id":"hxc","name":"HXC: Physical Identity Protocol // 物理アイデンティティの再定義","desc":"[PRE-LAUNCH MANIFESTO] 0と1の海に溶けた個人を、再び「物質」へ。NFCチップ、Soul-Link、そしてMENSAのロジックが交差する、次世代の身分証明議定書。1万文字の徹底解析。"},{"id":"link","name":"Hexa Link: リンク集を、自分の世界観へ。","desc":"SNSのリンク集。それはあなたの「入り口」です。Hexa Linkは、凡庸なリンク集を、あなた専用の「コマンドメニュー」へと再定義します。"},{"id":"mensa","name":"MENSA Maverick // 異端知性の解析と再構築","desc":"[RESTRICTED ACCESS] 全人口上位2%の知能指数。社会不適合という名のギフト。MENSA会員が綴る、組織への決別と、Web構築における『純粋ロジック』の証明。2000文字のデータ・マニフェスト。"},{"id":"order-flow","name":"Hexa Order: 「依頼」を、ワクワクする体験に。","desc":"退屈な問い合わせフォームを、ゲームの「オーダー受注」画面へ。Hexa Orderは、入力のストレスを楽しみへと変え、成約率を向上させます。"},{"id":"origin","name":"The Origin: 異端の知性が描く「生存の設計図」","desc":"Hexa Relation創設者の全記録。メンサとしての知性、社会からの拒絶、探偵・マジシャン・ITを経て辿り着いた「嘘のないWeb制作」への情熱。なぜ私たちはゲームの世界観に拘るのか。その答えがここにあります。"},{"id":"portal","name":"Hexa Portal: 制作進捗を、クエスト形式で。","desc":"クライアント専用「冒険の拠点」。制作の進捗をリアルタイムでクエスト管理。煩わしい連絡を、楽しいゲーム体験へとアップデートします。"},{"id":"vtuber","name":"VTuber・配信者向けゲーム風ポートフォリオ制作","desc":"VTuber・配信者のための没入型自己紹介サイト。アバターの世界観をWebに。ビジュアルノベル風、RPG風など、ファンが喜ぶギミック満載のサイトを制作。YouTubeアルゴリズムに依存しない、あなたの「聖地」を構築します。"}];
        // AUTO_INJECT_END

        let currentAnalytics = {};
        let currentSort = 'visit'; // Default to visit order
        let searchTerm = '';

        function startAnalytics() {
            db.collection('analytics').onSnapshot((querySnapshot) => {
                let totalHits = 0;
                ALL_PAGE_IDS.forEach(id => { currentAnalytics[id] = { hits: 0, orders: 0, lastVisit: null }; });
                querySnapshot.forEach((doc) => {
                    const id = doc.id;
                    if (!ALL_PAGE_IDS.includes(id)) return;
                    currentAnalytics[id] = doc.data();
                    totalHits += currentAnalytics[id].hits || 0;
                });
                renderTables();
                document.getElementById('total-hits').innerText = totalHits.toLocaleString();
            });
            document.getElementById('total-orders').innerText = "0";
        }

        function sortData(type) { currentSort = type; renderTables(); }
        function filterLPs() { searchTerm = document.getElementById('lp-search').value.toLowerCase(); renderTables(); }

        function renderTables() {
            renderAnalyticsTable();
            renderMarketingTable();
        }

        function renderAnalyticsTable() {
            const tbody = document.querySelector('#analytics-table tbody');
            tbody.innerHTML = '';
            const filteredIds = ALL_PAGE_IDS.filter(id => id.toLowerCase().includes(searchTerm));
            const sortedIds = filteredIds.sort((a, b) => {
                if (a === 'nox') return -1; if (b === 'nox') return 1;
                const dataA = currentAnalytics[a] || { hits: 0, orders: 0, lastVisit: null };
                const dataB = currentAnalytics[b] || { hits: 0, orders: 0, lastVisit: null };
                if (currentSort === 'orders') return (dataB.orders || 0) - (dataA.orders || 0);
                if (currentSort === 'hits') return (dataB.hits || 0) - (dataA.hits || 0);
                if (currentSort === 'visit') {
                    const timeA = dataA.lastVisit ? dataA.lastVisit.toMillis() : 0;
                    const timeB = dataB.lastVisit ? dataB.lastVisit.toMillis() : 0;
                    return timeB - timeA;
                }
                return 0;
            });
            sortedIds.forEach((id) => {
                const data = currentAnalytics[id] || { hits: 0, orders: 0, lastVisit: null };
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td><a href="../save/${id}/" target="_blank" class="hover:underline text-green-400">${id}</a></td>
                    <td>${data.orders || 0}</td>
                    <td>${data.hits || 0}</td>
                    <td class="cursor-pointer hover:underline text-green-400" onclick="showLogs('${id}')">
                        ${data.lastVisit ? data.lastVisit.toDate().toLocaleString() : '---'}
                    </td>`;
                tbody.appendChild(tr);
            });
        }

        function renderMarketingTable() {
            const tbody = document.querySelector('#marketing-table tbody');
            if (!tbody) return;
            tbody.innerHTML = '';
            const baseIntro = { id: '', name: 'Official Intro', desc: '総合紹介ページ。全スタイルのショーケース。' };
            const pages = [baseIntro, ...MARKETING_PAGES];
            const filtered = pages.filter(p => 
                p.id.toLowerCase().includes(searchTerm) || p.name.toLowerCase().includes(searchTerm) || p.desc.toLowerCase().includes(searchTerm)
            );
            filtered.forEach(p => {
                let colorClass = 'text-green-500';
                if (p.id.includes('vtuber')) colorClass = 'text-pink-500';
                else if (p.id.includes('business') || p.id.includes('founder') || p.id.includes('portal')) colorClass = 'text-cyan-500';
                else if (p.id.includes('mensa') || p.id.includes('origin')) colorClass = 'text-red-500 font-bold';
                else if (p.id.includes('order') || p.id.includes('card')) colorClass = 'text-yellow-500';
                else if (p.id.includes('engineer') || p.id.includes('archive')) colorClass = 'text-green-400';

                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td class="p-2 border border-green-900 font-bold ${colorClass}">${p.name}</td>
                    <td class="p-2 border border-green-900 opacity-60">${p.desc}</td>
                    <td class="p-2 border border-green-900 text-center">
                        <a href="../intro/${p.id}${p.id ? '/' : ''}" target="_blank" class="text-green-400 hover:underline">OPEN</a>
                    </td>`;
                tbody.appendChild(tr);
            });
        }

        async function showLogs(pageId) {
            const modal = document.getElementById('log-modal');
            const content = document.getElementById('log-content');
            document.getElementById('log-title').innerText = `▶ ${pageId} の訪問履歴`;
            content.innerHTML = '<p class="blink">LOADING...</p>';
            modal.style.display = 'flex';
            try {
                const snapshot = await db.collection('referrals').doc(pageId).collection('logs').orderBy('timestamp', 'desc').limit(20).get();
                if (snapshot.empty) { content.innerHTML = '<p class="opacity-50 italic">ログが ありません</p>'; return; }
                content.innerHTML = '';
                snapshot.forEach(doc => {
                    const log = doc.data();
                    const date = log.timestamp ? log.timestamp.toDate().toLocaleString() : '---';
                    const div = document.createElement('div');
                    div.className = 'log-item';
                    div.innerHTML = `<span class="log-date">${date}</span> <span class="log-ref">${log.referrer}</span>`;
                    content.appendChild(div);
                });
            } catch (err) { content.innerHTML = '<p class="text-red-500">エラーが おきました</p>'; }
        }

        function closeLogModal() { document.getElementById('log-modal').style.display = 'none'; }
        const startDate = new Date('2026-05-21');
        const today = new Date();
        document.getElementById('days-active').innerText = Math.floor((today - startDate) / (1000 * 60 * 60 * 24));

        function checkPass() {
            const pass = document.getElementById('admin-pass').value;
            if (pass === '2213') { localStorage.setItem('admin_auth', 'true'); showAdminContent(); } else { alert('パスワードが ちがいます'); }
        }

        function showAdminContent() {
            document.getElementById('password-gate').classList.add('hidden');
            document.getElementById('admin-content').classList.remove('hidden');
            renderMarketingTable();
            startAnalytics();
        }

        if (localStorage.getItem('admin_auth') === 'true') { showAdminContent(); }
        document.getElementById('admin-pass').addEventListener('keypress', (e) => { if (e.key === 'Enter') checkPass(); });
    </script>
</body>
</html>

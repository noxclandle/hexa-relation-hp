<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CYBER-TECH - Portfolio (Unknown Style)</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #050505; color: #00f2ff;
            font-family: 'Share Tech Mono', monospace;
            overflow: hidden;
        }
        .cyber-border {
            border: 1px solid #00f2ff;
            box-shadow: 0 0 15px rgba(0, 242, 255, 0.2);
            background: rgba(0, 242, 255, 0.05);
            position: relative;
        }
        .cyber-border::before {
            content: ''; position: absolute; top: -2px; left: -2px;
            width: 10px; height: 10px; border-top: 2px solid #00f2ff; border-left: 2px solid #00f2ff;
        }
        .scanline {
            width: 100%; height: 2px; background: rgba(0, 242, 255, 0.1);
            position: absolute; top: 0; animation: scan 4s linear infinite;
        }
        @keyframes scan { from { top: 0; } to { top: 100%; } }
    </style>
</head>
<body class="h-screen flex items-center justify-center p-6">
    <div class="scanline"></div>
    <div class="cyber-border p-10 w-full max-w-2xl relative overflow-hidden">
        <div class="mb-10">
            <p class="text-xs opacity-50 mb-2">SYSTEM_ID: NEON_RUNNER_V4</p>
            <h1 class="text-6xl font-bold tracking-tighter">CYBER_CORE</h1>
        </div>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-10">
            <div>
                <h2 class="text-xl mb-4 border-b border-cyan-900 pb-2">DATA_STREAM</h2>
                <p class="text-sm opacity-80 leading-relaxed">
                    Futuristic aesthetics combined with high-performance metrics. Designed for those who demand precision and speed.
                </p>
            </div>
            <div class="flex flex-col gap-4">
                <button class="cyber-border p-4 hover:bg-cyan-400 hover:text-black transition-all uppercase">Execute Link</button>
                <button class="cyber-border p-4 hover:bg-cyan-400 hover:text-black transition-all uppercase">Access Archives</button>
            </div>
        </div>
    </div>
</body>
</html>


      <svg width="480" height="800" viewBox="0 0 480 800" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <radialGradient id="grad" cx="50%" cy="50%" r="50%" fx="50%" fy="50%">
            <stop offset="0%" style="stop-color:#000033;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#000011;stop-opacity:1" />
          </radialGradient>
        </defs>
        <rect width="100%" height="100%" fill="url(#grad)" />
        <circle cx="240" cy="400" r="100" fill="none" stroke="#4488ff" stroke-width="2" opacity="0.3">
          <animate attributeName="r" values="100;150;100" dur="5s" repeatCount="indefinite" />
          <animate attributeName="opacity" values="0.3;0.1;0.3" dur="5s" repeatCount="indefinite" />
        </circle>
        <text x="240" y="400" font-family="sans-serif" font-size="20" fill="#4488ff" text-anchor="middle" dominant-baseline="middle">TIME GATE</text>
      </svg>
    
<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VISUAL-NOVEL - Portfolio (Unknown Style)</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #fce7f3;
            font-family: 'Noto Sans JP', sans-serif;
        }
        .vn-window {
            background: rgba(0, 0, 0, 0.7);
            border: 3px solid #fff;
            border-radius: 10px;
            color: #fff;
            padding: 30px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }
        .vn-name {
            background: #be185d;
            color: #fff;
            padding: 5px 20px;
            border-radius: 5px;
            position: absolute;
            top: -20px; left: 30px;
            font-weight: bold;
        }
        .character-placeholder {
            width: 300px; height: 500px;
            background: linear-gradient(to bottom, #f472b6, transparent);
            border-radius: 200px 200px 0 0;
            mask-image: linear-gradient(to top, transparent, black 20%);
        }
    </style>
</head>
<body class="h-screen flex flex-col justify-end items-center p-10 bg-cover bg-center" style="background-image: url('https://www.transparenttextures.com/patterns/cream-paper.png');">
    
    <div class="character-placeholder mb-4 opacity-80 animate-bounce" style="animation-duration: 4s;"></div>

    <div class="vn-window w-full max-w-4xl relative">
        <div class="vn-name text-xl">美少女ゲーム風</div>
        <p class="text-2xl leading-relaxed">
            「ストーリーテリングを重視した、ビジュアルノベル風のレイアウトだよ。<br>
            あなたの個性を、まるでゲームのヒロインや主人公のように魅力的に伝えることができるんだ。」
        </p>
        <div class="mt-6 flex justify-end gap-6 opacity-60 text-sm">
            <span>Next ></span>
            <span>Auto</span>
            <span>Skip</span>
            <span>Save</span>
        </div>
    </div>
</body>
</html>

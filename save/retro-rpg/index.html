<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RETRO-RPG - Portfolio (Unknown Style)</title>
    <link href="https://fonts.googleapis.com/css2?family=DotGothic16&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #000; color: #fff;
            font-family: 'DotGothic16', sans-serif;
            image-rendering: pixelated;
        }
        .dq-window {
            background: #000; border: 4px solid #fff; border-radius: 8px;
            box-shadow: 0 0 0 4px #000, 0 0 0 8px #fff;
            padding: 20px; position: relative;
        }
        .cursor-finger::before {
            content: '▶'; position: absolute; left: -25px;
            animation: blink 0.5s step-end infinite;
        }
        @keyframes blink { 50% { opacity: 0; } }
        .pixel-art-bg {
            background-image: radial-gradient(#333 1px, transparent 1px);
            background-size: 20px 20px;
        }
    </style>
</head>
<body class="p-10 pixel-art-bg min-h-screen flex flex-col items-center">
    <div class="dq-window w-full max-w-md mb-10">
        <h1 class="text-2xl mb-4">▼ なまえ</h1>
        <p class="text-4xl mb-6">レトロ ゆうしゃ</p>
        <div class="grid grid-cols-2 gap-4 text-xl">
            <p>レベル：99</p>
            <p>ＨＰ：999</p>
            <p>ＭＰ：999</p>
            <p>こうげき：255</p>
        </div>
    </div>

    <div class="dq-window w-full max-w-md">
        <h2 class="text-xl mb-4">▼ コマンド</h2>
        <div class="space-y-4 text-2xl pl-8">
            <p class="relative cursor-finger">はなす</p>
            <p>じゅもん</p>
            <p>どうぐ</p>
            <p>しらべる</p>
        </div>
    </div>

    <div class="mt-20 text-center opacity-50">
        <p>Retro-RPG Style Sample // Hexa Relation</p>
    </div>
</body>
</html>

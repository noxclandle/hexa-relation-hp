<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hexa Relation | ぼうけんの じゅんび</title>
    <link href="https://fonts.googleapis.com/css2?family=DotGothic16&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --primary-color: #4a5568; /* Soft Slate Gray */
            --accent-color: #2d3748;
            --bg-color: #f7fafc;      /* Soft White/Gray */
            --window-bg: #ffffff;
            --border-color: #cbd5e0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--accent-color);
            font-family: 'DotGothic16', sans-serif;
            margin: 0; padding: 20px;
            display: flex; justify-content: center; align-items: center; min-height: 100vh;
        }

        .mother-window {
            background-color: var(--window-bg);
            border: 4px solid var(--primary-color);
            border-radius: 16px;
            padding: 4px;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
        }

        .mother-window-inner {
            border: 2px solid var(--border-color);
            border-radius: 12px;
            padding: 2rem;
        }

        h1 { font-size: 1.5rem; margin-bottom: 1.5rem; border-bottom: 2px solid var(--border-color); padding-bottom: 0.5rem; text-align: center; color: var(--primary-color); }

        .input-group { margin-bottom: 1.5rem; }
        label { display: block; margin-bottom: 0.5rem; font-size: 1.1rem; color: var(--primary-color); }
        
        input, textarea {
            width: 100%;
            background: #fff;
            border: 2px solid var(--border-color);
            border-radius: 8px;
            padding: 12px;
            color: #1a202c;
            font-family: inherit;
            outline: none;
            transition: all 0.3s;
        }
        input:focus, textarea:focus { border-color: var(--primary-color); box-shadow: 0 0 0 3px rgba(74, 85, 104, 0.1); }

        .submit-btn {
            width: 100%;
            background: var(--primary-color);
            border: 2px solid var(--primary-color);
            color: #fff;
            padding: 14px;
            border-radius: 8px;
            font-size: 1.2rem;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 1rem;
            font-weight: bold;
        }
        .submit-btn:hover { background: var(--accent-color); border-color: var(--accent-color); transform: translateY(-1px); }
        .submit-btn:active { transform: translateY(0); }

        .back-link { display: block; text-align: center; margin-top: 1.5rem; color: #a0aec0; text-decoration: none; font-size: 0.9rem; }
        .back-link:hover { color: var(--primary-color); }

        .hidden { display: none; }
        
        #success-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255,255,255,0.9); z-index: 1000; justify-content: center; align-items: center; text-align: center;
        }
    </style>
</head>
<body>

    <div class="mother-window">
        <div class="mother-window-inner">
            <h1>▼ ぼうけんの じゅんび</h1>
            
            <form id="order-form">
                <div class="input-group">
                    <label>▶ おなまえ (2文字以上)</label>
                    <input type="text" id="name" name="name" placeholder="おなまえ を いれてください" minlength="2" required>
                </div>

                <div class="input-group">
                    <label>▶ れんらくさき</label>
                    <input type="text" id="contact" name="contact" placeholder="メール / SNS ID など" required>
                </div>

                <div class="input-group">
                    <label>▶ ごいらい内容</label>
                    <textarea id="message" name="message" rows="5" placeholder="どんな ぼうけん（ごいらい）を したいですか？" required></textarea>
                </div>

                <input type="hidden" id="referrer" name="referrer">

                <button type="submit" class="submit-btn">▶ きろくを おくる</button>
            </form>

            <a href="javascript:history.back()" class="back-link">▶ もどる</a>
        </div>
    </div>

    <div id="success-overlay">
        <div class="mother-window" style="max-width: 350px; background: white;">
            <div class="mother-window-inner">
                <p class="text-xl mb-6 text-slate-700">きろくが 完了しました！<br><br>のちほど 伝書鳩（通知）が<br>とどきます。 おたのしみに！</p>
                <button onclick="window.location.href='../'" class="submit-btn">▶ TOPへ もどる</button>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script>
        const firebaseConfig = {
          apiKey: "AIzaSyDlovNerE44bGykzWDJkqmoD4fbSHnzveI",
          authDomain: "hexa-relation.firebaseapp.com",
          projectId: "hexa-relation",
          storageBucket: "hexa-relation.firebasestorage.app",
          messagingSenderId: "318065017750",
          appId: "1:318065017750:web:94acf3c9c43632b3ff93b7",
          measurementId: "G-15NM9TWFE2"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        const urlParams = new URLSearchParams(window.location.search);
        const ref = urlParams.get('ref') || urlParams.get('from') || 'ちょくせつ';
        document.getElementById('referrer').value = ref;

        const form = document.getElementById('order-form');
        const DISCORD_WEBHOOK_URL = 'https://discord.com/api/webhooks/1507236311180771348/P-wdDn_xEgm7ig5w7s3WHuP3waVmARS1sNi9lkvsmzMuDnUm8S2lKrx6Dv7ieQmtTFO1';
        let isSubmitting = false;

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            if (isSubmitting) return;
            isSubmitting = true;
            
            const name = document.getElementById('name').value;
            const contact = document.getElementById('contact').value;
            const message = document.getElementById('message').value;
            const referrer = document.getElementById('referrer').value;

            try {
                await db.collection('orders').add({
                    name: name,
                    contact: contact,
                    message: message,
                    referrer: referrer,
                    timestamp: firebase.firestore.FieldValue.serverTimestamp()
                });
            } catch (err) {
                console.warn("Firestore Error:", err);
            }

            const discordMessage = {
                embeds: [{
                    title: "🎮 【新着】ぼうけんの ごいらい！",
                    color: 3447003, // Slate Blue
                    fields: [
                        { name: "👤 おなまえ", value: name, inline: true },
                        { name: "📱 れんらくさき", value: contact, inline: true },
                        { name: "📜 ごいらい内容", value: "```" + message + "```" },
                        { name: "🚩 紹介元", value: `**${referrer}**`, inline: false }
                    ],
                    timestamp: new Date().toISOString()
                }]
            };

            try {
                const response = await fetch(DISCORD_WEBHOOK_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(discordMessage)
                });

                if (response.ok) {
                    document.getElementById('success-overlay').style.display = 'flex';
                    playSuccessSound();
                } else {
                    alert('エラーが おきました。');
                    isSubmitting = false;
                }
            } catch (err) {
                console.error(err);
                alert('つうしん エラーが おきました。');
                isSubmitting = false;
            }
        });

        function playSuccessSound() {
            try {
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const oscillator = audioCtx.createOscillator();
                const gainNode = audioCtx.createGain();
                oscillator.type = 'triangle';
                oscillator.frequency.setValueAtTime(523.25, audioCtx.currentTime); // C5
                oscillator.frequency.exponentialRampToValueAtTime(1046.50, audioCtx.currentTime + 0.1); // C6
                gainNode.gain.setValueAtTime(0.05, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.3);
                oscillator.connect(gainNode);
                gainNode.connect(audioCtx.destination);
                oscillator.start();
                oscillator.stop(audioCtx.currentTime + 0.3);
            } catch (e) {}
        }
    </script>
</body>
</html>
